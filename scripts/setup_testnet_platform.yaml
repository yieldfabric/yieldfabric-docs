# Run this fixture against the isolated chain-153 payments instance with:
#
#   CHAIN_ID=153 PAY_SERVICE_URL=http://localhost:3003 \
#     python3 -m yieldfabric.cli setup ../scripts/setup_testnet_platform.yaml
#
# PAY_SERVICE_URL selects payments-direct calls. CHAIN_ID pins every auth
# session to 153, which makes auth route account activation to its configured
# services.payments_urls["153"] entry (:3003 locally).

users:
  - id: payer@yieldfabric.com
    password: payer_password
    role: SuperAdmin

  - id: originator@yieldfabric.com
    password: originator_password
    role: SuperAdmin

  - id: collateral@yieldfabric.com
    password: collateral_password
    role: SuperAdmin

  - id: issuer@yieldfabric.com
    password: issuer_password
    role: SuperAdmin

  - id: investor@yieldfabric.com
    password: investor_password
    role: SuperAdmin

groups:
  - id: collateral-group
    name: Collateral Group
    description: Collateral Group Description
    group_type: project
    user:
      id: collateral@yieldfabric.com
      password: collateral_password
    # members:
    #   - id: issuer@yieldfabric.com # need to enable NFT owner
    #     role: owner

  - id: issuer-group
    name: Issuer Group
    description: Issuer Group Description
    group_type: project
    user:
      id: issuer@yieldfabric.com
      password: issuer_password
    # members:
    #   - id: investor@yieldfabric.com
    #     role: owner
    #   - id: collateral@yieldfabric.com # need to enable NFT owner
    #     role: owner

