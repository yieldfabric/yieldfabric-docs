# ════════════════════════════════════════════════════════════════════════════
#  DATA-POLICY ON GROUP ACCOUNTS — RESTRICTED-MEMBER EXECUTION FUNCTIONAL SUITE
# ════════════════════════════════════════════════════════════════════════════
#
#  Runs against the LIVE runtime (Rust + circom + Solidity) via the Python
#  harness:  python -m yieldfabric.cli execute scripts/datapolicy_group_suite.yaml
#  Assumes a FRESH deploy + `setup.yaml` seeded (users + Issuer/Collateral groups
#  with deployed accounts).
#
#  FEATURE UNDER TEST — "execute a group function through a policy by a RESTRICTED
#  member". It MIRRORS NFT group membership exactly: the policy is the membership
#  credential and its EXECUTOR is the member. The relay is only the meta-tx submitter
#  (tx.origin) and NEVER appears in the policy. The execution chain is the same relay→I→G
#  as any delegate group call, with executeUnderPolicy as the entry point (mirrors
#  yieldfabric-smart-contracts/test/ConfidentialAccountPolicy.test.ts):
#    G = the group account (Issuer Group)          — the policy account; the op runs ON G
#    approver = the OWNER (issuer)                  — in `required_signers`; issuer creates AND
#               approves the policy (a reusable M-of-N signature over the operation-independent
#               digest), GRANTING collateral execution — like an owner adding an NFT member
#    executor = the restricted MEMBER (collateral) — in `executors_address`; the policy holder.
#               Its OWN account I is msg.sender of executeUnderPolicy
#               (relay → I.executeMultiMetaTransaction([ G.executeUnderPolicy(...) ]) → G),
#               which isPolicyCaller checks against executors_address.
#
#  The owner registers a data policy on G and APPROVES it ONCE. The restricted `policymember`
#  (PolicyExecution-scoped, NOT an on-chain owner — recognised purely BY this policy) then
#  triggers a bounded confidential send out of G through executeUnderPolicy on its own account I;
#  the policy (executor check + approval + amount bounds + data requirements) gates it.
#
#  Semantics anchored in:
#    yieldfabric-tokens/src/flow/pipeline_gate.rs  (add/approve/execute resolvers,
#                                                    require_group_policy_account)
#    yieldfabric-smart-contracts/contracts         (DataPolicyLib, executeUnderPolicy)
#
#  `expect_failure: true` marks negative tests (a failed command is PASS, a success
#  is FAIL). `expect_error` optionally substring-matches the surfaced error.
#
#  Parties (seeded SuperAdmins; see setup.yaml):
#    issuer@yieldfabric.com     — owner of "Issuer Group"  → registers + APPROVES the policy
#    collateral@yieldfabric.com — restricted policymember  → EXECUTOR (policy holder) + trigger
#    payer@yieldfabric.com      — non-registrar signer used to keep the unapproved fixture at 0/1
#    (the relay / VAULT_PRIVATE_KEY only submits the meta-tx; it is NOT a policy participant)
#
#  ⚠️  ENV-SPECIFIC CONSTANT — the AUD token's on-chain CONTRACT address. It MUST be
#  the token that the `aud-token-asset` asset deposits into (the policy binds the
#  send to this 0x address, not the asset slug). The value below is setup.yaml's
#  chain-31337 AUD token; change it if your deploy differs.
#
#  Coverage:
#    Happy  register → owner APPROVES → member (executor) triggers a bounded send out of G, then
#           ACCEPTS and SPENDS the inbound (ground-truth proof the policy-sent funds credited)
#    A      execute BEFORE the approval threshold is met        → fail (not fully approved)
#    B      a NON-required-signer (collateral) tries to APPROVE → fail (not in caller set)
#    D      execute with amount ABOVE the policy's hi bound     → fail
#    E      execute an op the policy is NOT bound to (Withdraw) → fail
#    F      max_use=1: execute twice                            → 2nd fail
#    G      policy start in the future: execute                → fail
#    H      a data requirement that cannot be met: execute      → fail
#    I      register while NOT acting as the group              → fail (group-accounts-only)
#
#  ORACLE CONSTRAINTS (source=3 data requirement — a committed oracle value must
#  satisfy a frozen constraint, proved in ZK by the DataVerifier):
#    O-commit  commit a confidential oracle document                  → passes
#    O-happy   constraint SATISFIED → restricted member executes      → passes
#    O1        execute an oracle-gated policy whose doc was NOT committed → fail (no document, at execute)
#    O2        register an oracle req whose doc was NOT committed        → fail (no document, fail-fast at register)
#
#  RETIRE / ON-CHAIN REVOCATION (removeDataPolicy → DataPolicyLib.removePolicy;
#  the settle hook flips the projection row to revoked + deletes the approval
#  artifact; a revoked policy can never be approved or executed again — the
#  only path forward is a successor registration, and the freed id is reusable):
#    R-happy   register → approve → execute (proves LIVE) → owner retires      → passes
#    R-read    default dataPolicies read EXCLUDES the retired policy;
#              includeRevoked read returns it flagged revoked=true             → asserts
#    R1        approve AFTER retire                                            → fail ("revoked on-chain … novation")
#    R2        execute AFTER retire                                            → fail ("revoked on-chain … novation")
#    R3        retire while NOT acting as the group                            → fail (group-accounts-only)
#    R4        the restricted MEMBER (non-owner) tries to retire               → fail (member can execute,
#              never administer: the narrowed PolicyExecution delegation can't sign with group keys, and
#              the on-chain backstop is owners-only — OnlyOwnersCanRemovePolicies)
#    R5        retire a policy id that was never registered                    → fail (PolicyDoesNotExist, on-chain)
#    R6        re-register the SAME id (chain freed it; projection row revives
#              active), approve afresh (old artifact was deleted), execute     → passes (full id-reuse loop)
#
#  ⚠️  R-suite REQUIRES the post-removePolicy ConfidentialAccountImplementation —
#  group accounts are EIP-1167 clones, so on a stack whose implementation predates
#  removePolicy the retire reverts (no such function) and the R commands fail.
#  Redeploy the chain stack (fresh implementation) before running.
#
#  vIdHash is now SERVER-DERIVED: registering an oracle requirement freezes its
#  `constraintCommitment` (DataVerifier vIdHash). Callers OMIT it and pass the raw
#  `oracle_query` instead — addDataPolicy reads the committed document and runs the
#  SAME gen_oracle_witness the executor uses to derive the commitment (and mints a
#  random salt for bound privacy). So O-happy is fully automated; its execute
#  SUCCEEDING is the runtime parity proof (registration-derived vIdHash == the
#  executor's). Callers may still pass `constraint_commitment` explicitly (O1 does,
#  to reach the execute-time gate). See pipeline_gate.rs::add_data_policy_inner.
# ════════════════════════════════════════════════════════════════════════════

commands:

  # ───────────────────────── SETUP / IDENTITY RESOLUTION ─────────────────────────
  # Resolve the addresses the policies are wired from, straight off the JWT claims.

  # Owner acting AS the group → G (group_account_address), G's wallet id, and the
  # owner's own account (the approver registered in required_signers).
  - name: owner_ctx
    type: whoami
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }

  # The restricted member's own account (the executor, on-chain `I`) + user id.
  - name: member_ctx
    type: whoami
    user: { id: collateral@yieldfabric.com, password: collateral_password }

  # A distinct signer for the negative unapproved-policy fixture. Because payer is not the
  # issuer-registrar, registration cannot auto-collect this approval.
  - name: unapproved_signer_ctx
    type: whoami
    user: { id: payer@yieldfabric.com, password: payer_password }

  # NOTE: collateral is deliberately NOT added as a member here. Registering the data policy below
  # (happy_add_policy, naming collateral in `executor_accounts`) IS what makes collateral a restricted
  # policymember — auth DERIVES membership from the policy at delegation-mint time (no group_members
  # row), and that membership is valid only while the policy is. This "register ⇒ membership" is the
  # feature under test; the old explicit `add_member` step is gone.

  # Fund the GROUP's confidential AUD so the bounded send has balance to move. A fresh
  # group account holds no ERC-20, so it can't `deposit` directly (deposit pulls ERC-20
  # from the caller). Fund the owner (who holds ERC-20), send to the group, and have the
  # group accept — the way nc_acacia moves assets into a group.
  - name: owner_self_ctx          # issuer's OWN wallet id (owner_ctx acts as the group, so its
    type: whoami                  # default_wallet_id is the GROUP's) — required_signers needs the issuer
    user: { id: issuer@yieldfabric.com, password: issuer_password }

  - name: fund_owner_aud
    type: deposit
    user: { id: issuer@yieldfabric.com, password: issuer_password }   # as SELF — issuer holds ERC-20
    parameters:
      asset_id: aud-token-asset
      amount: 1000000000000000000000
      idempotency_key: dp-fund-owner-$(date +%s | tee /tmp/yf_grp_nonce)

  - name: fund_group_send
    type: instant
    user: { id: issuer@yieldfabric.com, password: issuer_password }   # as SELF → send into the group
    parameters:
      asset_id: aud-token-asset
      amount: 1000000000000000000000
      destination_id: Issuer Group
      idempotency_key: dp-fund-group-send-$(date +%s)

  - name: fund_group_accept
    type: accept_all
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }   # as the GROUP
    parameters:
      denomination: aud-token-asset
      wait: true


  # ════════════════════ HAPPY PATH — restricted member executes ════════════════════
  # Policy 9001 on G mirrors a delegate group call: the final group-function call runs through
  # `executeUnderPolicy` on the EXECUTOR's own account I (relay → I → G) — the policy analog of an
  # NFT member's relay→I→G delegate call:
  #   - the OWNER registers the policy on G (defines the restriction: bound to `send`, amount in
  #     [0, 500 AUD], gated by a confidential-balance requirement on AUD) and APPROVES it — issuer is
  #     the `required_signers`, and its approval GRANTS collateral execution;
  #   - the restricted MEMBER (collateral) is the `executor_accounts` (the policy holder). Its OWN
  #     account I runs the outer meta-tx, so `msg.sender` of executeUnderPolicy on G is I, which
  #     isPolicyCaller checks against `executors_address`. The relay only submits the meta-tx to I.
  - name: happy_add_policy
    type: add_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)01"
      expiry: "$(date -v+365d +%s)"
      max_use: "5"
      min_signatories: 1
      required_signers: [ $owner_self_ctx.default_wallet_id ]   # the OWNER (issuer) approves — its sig authorizes the policy (like granting NFT membership)
      # The EXECUTOR is the policy holder (collateral): its OWN account I is msg.sender of
      # executeUnderPolicy via relay → I.executeMultiMetaTransaction → G, checked by isPolicyCaller.
      executor_accounts: [ $member_ctx.default_wallet_id ]
      allowed_operations: [ send ]
      amount_bounds:
        - token: aud-token-asset   # ⚠️ AUD token (see header)
          lo: "0"
          hi: "500000000000000000000"
      requirements:
        - source: 0                                              # PrivateVault (confidential balance)
          denomination: aud-token-asset
          lo: "0"
          hi: "1000000000000000000000000000"
      idempotency_key: dp-9001-add-$(date +%s)

  # The OWNER (issuer) approves once (1-of-1) — issuer is the policy's required_signer. This is the
  # owner GRANTING collateral the right to execute under the policy, mirroring an owner adding an NFT
  # member to the group. Issuer signs AS SELF (no `group:`), so the recovered approver account is
  # issuer's own account = required_signers[0].
  - name: happy_approve
    type: approve_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)01"

  # Read-back: the reusable approval is complete (1/1).
  - name: happy_approval_state
    type: data_policy_approval
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)01"

  - name: happy_assert_approved
    type: assert
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      actual: "$happy_approval_state.approved"
      equals: "True"

  # ── BASELINE: a regular delegate group send FROM G by the OWNER (issuer acting as the group via
  # relay → G.executeMultiMetaTransaction) — the NON-policy path that executeUnderPolicy mirrors. It
  # confirms send-from-G works on its own, and seeds the member with an extra 100 AUD so the
  # spend-based ground-truth check below leaves a positive remainder for the balance assertion.
  - name: baseline_owner_send_from_group
    type: instant
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      asset_id: aud-token-asset
      amount: 100000000000000000000
      destination_id: collateral@yieldfabric.com
      idempotency_key: dp-control-send-$(date +%s)
      wait: true

  # Baseline the destination's confidential AUD before the policy-driven send.
  - name: dest_aud_before
    type: balance
    user: { id: collateral@yieldfabric.com, password: collateral_password }
    parameters: { asset_id: aud-token-asset }

  # ★ THE FEATURE: the RESTRICTED member executes a bounded send OUT OF THE GROUP.
  - name: happy_execute
    type: execute_under_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)01"
      operation_type: Send
      operation_data:
        token_address: aud-token-asset
        destination_id: collateral@yieldfabric.com
        amount: "100000000000000000000"
      idempotency_key: dp-9001-exec-$(date +%s)

  # The member accepts the inbound policy-sent AUD.
  - name: dest_accept
    type: accept_all
    user: { id: collateral@yieldfabric.com, password: collateral_password }
    parameters: { denomination: aud-token-asset, wait: true }

  # ── GROUND TRUTH (no false +/-): the authoritative proof the policy-sent funds genuinely credited
  # is that the member can SPEND them. collateral sends the 100 AUD it just received back to issuer.
  # If the confidential balance is real, the send's sender-balance proof generates and settles; if the
  # credit never happened, the member has nothing to prove against and this FAILS. This does not depend
  # on the balance READ (which lags the async credit post-processing), so it cannot give a false pass.
  - name: dest_member_spend
    type: instant
    user: { id: collateral@yieldfabric.com, password: collateral_password }
    parameters:
      asset_id: aud-token-asset
      amount: 100000000000000000000
      destination_id: issuer@yieldfabric.com
      idempotency_key: dp-member-spend-$(date +%s)
      wait: true

  # Observational balance read AFTER the authoritative spend (post-processing has had time to settle).
  # The member started at 0, received 100 (policy) + 100 (control), spent 100 → must now read > 0.
  - name: dest_aud_after
    type: balance
    user: { id: collateral@yieldfabric.com, password: collateral_password }
    parameters: { asset_id: aud-token-asset }

  - name: happy_assert_funds_moved
    type: assert
    user: { id: collateral@yieldfabric.com, password: collateral_password }
    parameters:
      actual: "$dest_aud_after.private_balance"
      gt: "$dest_aud_before.private_balance"


  # ════════════════════════════ NEGATIVE GUARDS ════════════════════════════

  # ─── A — execute BEFORE approval (policy 9011 registered but never approved) ───
  # Registrar approval is auto-recorded only when the registrar is in the approver set. Naming
  # payer as the sole signer deliberately leaves this policy at 0/1 after issuer registers it.
  - name: a_add_unapproved
    type: add_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)11"
      expiry: "$(date -v+365d +%s)"
      max_use: "5"
      min_signatories: 1
      required_signers: [ $unapproved_signer_ctx.default_wallet_id ]
      executor_accounts: [ $member_ctx.default_wallet_id ]   # collateral = policy holder / executor (its account I is msg.sender at G via relay→I→G)
      allowed_operations: [ send ]
      amount_bounds:
        - { token: aud-token-asset, lo: "0", hi: "500000000000000000000" }
      requirements:
        - { source: 0, denomination: aud-token-asset, lo: "0", hi: "1000000000000000000000000000" }
      idempotency_key: dp-9011-add-$(date +%s)

  - name: a_execute_before_approval_fails
    type: execute_under_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)11"
      operation_type: Send
      operation_data:
        token_address: aud-token-asset
        destination_id: collateral@yieldfabric.com
        amount: "100000000000000000000"
      idempotency_key: dp-9011-exec-bad-$(date +%s)
      expect_failure: true
      expect_error: "not fully approved"

  # ─── B — a NON-REQUIRED-SIGNER tries to APPROVE 9001 ───
  # 9001's required_signers is the OWNER (issuer) — the approver. Collateral is the EXECUTOR (policy
  # holder), NOT in the caller set, so collateral attempting to APPROVE must be rejected. Collateral
  # EXECUTES under the policy; it never approves — the owner's approval is what grants it execution.
  - name: b_nonsigner_approve_fails
    type: approve_data_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)01"
      expect_failure: true
      expect_error: "caller set"

  # (No separate "wrong executor" negative: executeUnderPolicy runs on the executor's OWN account I,
  #  so msg.sender at G IS that executor — a non-executor literally cannot produce the call. The
  #  approval restriction is covered by B; the group-context requirement by I.)

  # ─── D — execute with amount ABOVE the policy's hi bound (500 AUD) ───
  - name: d_execute_over_bound_fails
    type: execute_under_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)01"
      operation_type: Send
      operation_data:
        token_address: aud-token-asset
        destination_id: collateral@yieldfabric.com
        amount: "600000000000000000000"
      idempotency_key: dp-9001-exec-over-bad-$(date +%s)
      expect_failure: true
      # Over-bound CONFIDENTIAL send. The plaintext PRE-FLIGHT in
      # `yieldfabric-vault/src/account/execute_policy.rs::build_witnesses` now rejects
      # this BEFORE proof generation with the real reason ("policy amount bound not
      # met: this send of … exceeds the per-transfer maximum of …"). The previous
      # surface was the on-chain proof-binding backstop (600 ∉ [0,500] → the range
      # proof's `who` signal is garbage → WhoMismatch); that ZK bind still exists as
      # the trust boundary — the pre-flight just refuses to attempt an impossible
      # proof and says why.
      expect_error: "amount bound not met"

  # ─── E — execute an op the policy is NOT bound to (Withdraw vs the bound Send) ───
  - name: e_execute_wrong_op_fails
    type: execute_under_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)01"
      operation_type: Withdraw
      operation_data:
        token_address: aud-token-asset
        amount: "100000000000000000000"
        obligor: "0x0000000000000000000000000000000000000000"
        treasurer_secret: ""
      idempotency_key: dp-9001-exec-wrongop-bad-$(date +%s)
      expect_failure: true
      # The backend op-binding PRE-CHECK (transaction_creation.rs) catches the wrong op BEFORE
      # submitting: the built Withdraw op (selector 0xd0d297b2) matches none of policy 9001's allowed
      # calls ([send 0x77bbee73]). A fast-fail — it never reaches the on-chain
      # OperationNotAllowedByPolicy backstop in DataPolicyLib.authorize.
      expect_error: "allowed calls (target/selector mismatch)"

  # ─── F — max_use exhaustion (policy 9012, max_use=1): 2nd execute must fail ───
  - name: f_add_capped
    type: add_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)12"
      expiry: "$(date -v+365d +%s)"
      max_use: "1"
      min_signatories: 1
      required_signers: [ $owner_self_ctx.default_wallet_id ]
      executor_accounts: [ $member_ctx.default_wallet_id ]   # collateral = policy holder / executor (its account I is msg.sender at G via relay→I→G)
      allowed_operations: [ send ]
      amount_bounds:
        - { token: aud-token-asset, lo: "0", hi: "500000000000000000000" }
      requirements:
        - { source: 0, denomination: aud-token-asset, lo: "0", hi: "1000000000000000000000000000" }
      idempotency_key: dp-9012-add-$(date +%s)

  - name: f_approve_capped
    type: approve_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)12"

  - name: f_execute_first_ok
    type: execute_under_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)12"
      operation_type: Send
      operation_data:
        token_address: aud-token-asset
        destination_id: collateral@yieldfabric.com
        amount: "100000000000000000000"
      idempotency_key: dp-9012-exec1-$(date +%s)

  - name: f_execute_second_fails
    type: execute_under_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)12"
      operation_type: Send
      operation_data:
        token_address: aud-token-asset
        destination_id: collateral@yieldfabric.com
        amount: "100000000000000000000"
      idempotency_key: dp-9012-exec2-bad-$(date +%s)
      expect_failure: true
      expect_error: "PolicyMaxUseExceeded"   # DataPolicyLib.authorize — counter (1) >= maxUse (1) after the first execute

  # ─── G — policy whose window has NOT started yet (start in the future) ───
  - name: g_add_future
    type: add_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)13"
      start: "$(date -v+365d +%s)"
      expiry: "$(date -v+730d +%s)"
      max_use: "5"
      min_signatories: 1
      required_signers: [ $owner_self_ctx.default_wallet_id ]
      executor_accounts: [ $member_ctx.default_wallet_id ]   # collateral = policy holder / executor (its account I is msg.sender at G via relay→I→G)
      allowed_operations: [ send ]
      amount_bounds:
        - { token: aud-token-asset, lo: "0", hi: "500000000000000000000" }
      requirements:
        - { source: 0, denomination: aud-token-asset, lo: "0", hi: "1000000000000000000000000000" }
      idempotency_key: dp-9013-add-$(date +%s)

  - name: g_approve_future
    type: approve_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)13"

  - name: g_execute_not_started_fails
    type: execute_under_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)13"
      operation_type: Send
      operation_data:
        token_address: aud-token-asset
        destination_id: collateral@yieldfabric.com
        amount: "100000000000000000000"
      idempotency_key: dp-9013-exec-bad-$(date +%s)
      expect_failure: true
      expect_error: "PolicyNotStarted"   # DataPolicyLib.authorize — block.timestamp < policy.start (window opens in 365d)

  # ─── H — a data requirement that cannot be met (PublicBalance on AUD ≫ holdings) ───
  - name: h_add_unmeetable
    type: add_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)14"
      expiry: "$(date -v+365d +%s)"
      max_use: "5"
      min_signatories: 1
      required_signers: [ $owner_self_ctx.default_wallet_id ]
      executor_accounts: [ $member_ctx.default_wallet_id ]   # collateral = policy holder / executor (its account I is msg.sender at G via relay→I→G)
      allowed_operations: [ send ]
      amount_bounds:
        - { token: aud-token-asset, lo: "0", hi: "500000000000000000000" }
      requirements:
        # PublicBalance (source 1): require an absurd ERC-20 balance the account can't have.
        - source: 1
          target: aud-token-asset
          threshold: "1000000000000000000000000000000000"
      idempotency_key: dp-9014-add-$(date +%s)

  - name: h_approve_unmeetable
    type: approve_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)14"

  - name: h_execute_requirement_unmet_fails
    type: execute_under_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)14"
      operation_type: Send
      operation_data:
        token_address: aud-token-asset
        destination_id: collateral@yieldfabric.com
        amount: "100000000000000000000"
      idempotency_key: dp-9014-exec-bad-$(date +%s)
      expect_failure: true
      expect_error: "DataRequirementNotMet"   # DataPolicyLib.authorize — source-1 PublicBalance requirement (absurd threshold) is unmet

  # ─── I — data policies are GROUP-ONLY: register while NOT acting as the group ───
  - name: i_add_as_individual_fails
    type: add_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password }   # NOTE: no `group:` → acts as self
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)15"
      expiry: "$(date -v+365d +%s)"
      max_use: "5"
      min_signatories: 1
      required_signers: [ $owner_self_ctx.default_wallet_id ]
      executor_accounts: [ $member_ctx.default_wallet_id ]   # collateral = policy holder / executor (its account I is msg.sender at G via relay→I→G)
      allowed_operations: [ send ]
      requirements:
        - { source: 0, denomination: aud-token-asset, lo: "0", hi: "1000000000000000000000000000" }
      idempotency_key: dp-9015-add-bad-$(date +%s)
      expect_failure: true
      expect_error: "GROUP accounts"


  # ════════════════════════════ ORACLE CONSTRAINTS ════════════════════════════
  # A source=3 requirement gates execution on a committed oracle value satisfying a
  # frozen constraint (ZK DataVerifier). The committing account is the requirement's
  # `obligor`; here the group commits under its own account.

  # ─── O-commit — commit a confidential oracle document (proves the commit API) ───
  - name: o_commit_doc
    type: commit_oracle_document
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      obligor: $owner_ctx.default_wallet_id
      key: "9020"
      document_json: '{"score": 750}'
      idempotency_key: dp-oracle-commit-$(date +%s)

  # ─── O-happy — constraint SATISFIED → restricted member executes (AUTOMATED) ───
  # No vIdHash to paste: OMIT constraint_commitment and pass the raw oracle_query.
  # addDataPolicy reads the committed document (O-commit) and derives + freezes the
  # commitment via the SAME gen_oracle_witness the executor runs. This execute
  # SUCCEEDING is the runtime parity proof (registration-derived vIdHash == executor's).
  - name: ohappy_add_policy
    type: add_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)20"
      expiry: "$(date -v+365d +%s)"
      max_use: "5"
      min_signatories: 1
      required_signers: [ $owner_self_ctx.default_wallet_id ]
      executor_accounts: [ $member_ctx.default_wallet_id ]   # collateral = policy holder / executor (its account I is msg.sender at G via relay→I→G)
      allowed_operations: [ send ]
      requirements:
        - source: 3
          obligor: $owner_ctx.default_wallet_id   # the account that committed the document (O-commit)
          token_id: "9020"
          # constraint_commitment OMITTED → derived server-side from oracle_query over the committed doc
          oracle_query: '{"score": [700, 1000000]}'   # the doc's score (750) is in [700, 1000000] ⇒ satisfied
      idempotency_key: dp-9020-add-$(date +%s)

  - name: ohappy_approve
    type: approve_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)20"

  - name: ohappy_execute
    type: execute_under_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)20"
      operation_type: Send
      operation_data:
        token_address: aud-token-asset
        destination_id: collateral@yieldfabric.com
        amount: "100000000000000000000"
      idempotency_key: dp-9020-exec-$(date +%s)

  # ─── O1 — execute an oracle-gated policy whose document was NEVER committed ───
  # Pass an EXPLICIT (dummy, non-zero) constraint_commitment so the server-derive is
  # skipped and registration succeeds; execution then fails at the "no committed
  # document" gate. (Omitting it instead fail-fasts at registration — see O2.)
  - name: o1_add_nodoc_policy
    type: add_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)21"
      expiry: "$(date -v+365d +%s)"
      max_use: "5"
      min_signatories: 1
      required_signers: [ $owner_self_ctx.default_wallet_id ]
      executor_accounts: [ $member_ctx.default_wallet_id ]   # collateral = policy holder / executor (its account I is msg.sender at G via relay→I→G)
      allowed_operations: [ send ]
      amount_bounds:
        - { token: aud-token-asset, lo: "0", hi: "500000000000000000000" }
      requirements:
        - source: 3                                  # Oracle
          obligor: $owner_ctx.default_wallet_id  # the committing account getCommitment reads
          token_id: "9021"    # a numeric key with NO committed document
          constraint_commitment: [ "1", "1" ]        # explicit ⇒ skips server-derive; execute hits the no-doc gate
          oracle_query: '{"score": [700, 1000000]}'
      idempotency_key: dp-9021-add-$(date +%s)

  - name: o1_approve_nodoc
    type: approve_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)21"

  - name: o1_execute_nodoc_fails
    type: execute_under_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)21"
      operation_type: Send
      operation_data:
        token_address: aud-token-asset
        destination_id: collateral@yieldfabric.com
        amount: "100000000000000000000"
      idempotency_key: dp-9021-exec-bad-$(date +%s)
      expect_failure: true
      expect_error: "no committed document"

  # ─── O2 — register an oracle policy whose document was NEVER committed (fail-fast) ───
  # Omit the commitment for an un-committed key: the server-derive has no document to read,
  # so registration fails IMMEDIATELY — instead of silently bricking at execution time.
  - name: o2_register_without_doc_fails
    type: add_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)22"
      expiry: "$(date -v+365d +%s)"
      max_use: "5"
      min_signatories: 1
      required_signers: [ $owner_self_ctx.default_wallet_id ]
      executor_accounts: [ $member_ctx.default_wallet_id ]   # collateral = policy holder / executor (its account I is msg.sender at G via relay→I→G)
      allowed_operations: [ send ]
      requirements:
        - source: 3
          obligor: $owner_ctx.default_wallet_id
          token_id: "9022"    # numeric key, never committed → server-derive has no document
          oracle_query: '{"score": [700, 1000000]}'
          # constraint_commitment OMITTED → server-derive reads the doc → none → fails fast at registration
      idempotency_key: dp-9022-add-bad-$(date +%s)
      expect_failure: true
      expect_error: "no committed document"


  # ════════════════════════ RETIRE / ON-CHAIN REVOCATION ════════════════════════
  # removeDataPolicy → MQ → relay self-call → DataPolicyLib.removePolicy on G:
  # deletes the on-chain policy struct (+ data reqs, allowed calls, amount bounds),
  # frees the id for re-registration. On settle the backend flips the projection
  # row to revoked (is_active=FALSE — kept, NOT dropped, so UIs show it AS revoked)
  # and deletes the reusable approval artifact. After that, approve and execute
  # both fail with the explicit "revoked on-chain … register a successor policy
  # (novation)" error — never the misleading "not found (register it first)".

  # ─── R-happy: full lifecycle — register …30, approve, execute once (proves the
  #     policy is LIVE so the post-retire failures below are meaningful), retire. ───
  - name: r_add_policy
    type: add_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)30"
      expiry: "$(date -v+365d +%s)"
      max_use: "5"
      min_signatories: 1
      required_signers: [ $owner_self_ctx.default_wallet_id ]
      executor_accounts: [ $member_ctx.default_wallet_id ]   # collateral = policy holder / executor (its account I is msg.sender at G via relay→I→G)
      allowed_operations: [ send ]
      amount_bounds:
        - { token: aud-token-asset, lo: "0", hi: "500000000000000000000" }
      requirements:
        - { source: 0, denomination: aud-token-asset, lo: "0", hi: "1000000000000000000000000000" }
      idempotency_key: dp-9030-add-$(date +%s)

  - name: r_approve
    type: approve_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)30"

  - name: r_execute_ok                    # the policy WORKS before retirement
    type: execute_under_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)30"
      operation_type: Send
      operation_data:
        token_address: aud-token-asset
        destination_id: collateral@yieldfabric.com
        amount: "100000000000000000000"
      idempotency_key: dp-9030-exec-$(date +%s)

  # ─── R3 — retire while NOT acting as the group (run BEFORE the real retire so
  #     the policy still exists; same group-accounts-only guard as registration). ───
  - name: r3_retire_as_individual_fails
    type: remove_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password }   # NOTE: no `group:` → acts as self
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)30"
      expect_failure: true
      expect_error: "GROUP accounts"

  # ─── R4 — the restricted MEMBER tries to retire the policy it executes under.
  #     A policymember can EXECUTE, never ADMINISTER: its acting-as-group delegation
  #     is force-narrowed to [PolicyExecution, CryptoOperations], which auth's
  #     sign_for_vault refuses to let sign with GROUP keys (the retire meta-tx runs
  #     ON G, unlike executeUnderPolicy which runs on the member's own account I);
  #     even reaching the chain, DataPolicyLib.removePolicy is owners-only
  #     (OnlyOwnersCanRemovePolicies). No expect_error: which layer rejects first
  #     is an implementation detail — the invariant is that it MUST fail. ───
  - name: r4_retire_by_member_fails
    type: remove_data_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)30"
      expect_failure: true

  # ─── ★ THE RETIRE: the owner (acting as the group) revokes …30 on-chain. The
  #     command waits for the MQ message to execute (the on-chain removePolicy). ───
  - name: r_retire
    type: remove_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)30"

  # The projection flip + approval-artifact delete run in the settle hook (graph
  # post-processing), ASYNC relative to the message's `executed` flag the retire
  # waited on. Give it a beat before reading back.
  - name: r_settle_lag
    type: sleep
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters: { seconds: 5 }

  # ─── R-read — the DEFAULT read excludes the retired policy… ───
  - name: r_read_default
    type: data_policies
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)30"

  - name: r_assert_excluded_by_default
    type: assert
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      actual: "$r_read_default.found"
      equals: "False"

  # …while the includeRevoked read returns it FLAGGED revoked (shown, not dropped).
  - name: r_read_revoked
    type: data_policies
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      wallet_id: $owner_ctx.default_wallet_id
      include_revoked: true
      policy_id: "$(cat /tmp/yf_grp_nonce)30"

  - name: r_assert_revoked_visible
    type: assert
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      actual: "$r_read_revoked.found"
      equals: "True"

  - name: r_assert_revoked_flagged
    type: assert
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      actual: "$r_read_revoked.revoked"
      equals: "True"

  # ─── R1 — a revoked policy can NOT be approved again (the owner's own prior
  #     approval was deleted at settle; re-approving must fail with the truthful
  #     revoked error, not "not found (register it first)"). ───
  - name: r1_approve_after_retire_fails
    type: approve_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)30"
      expect_failure: true
      expect_error: "revoked on-chain"

  # ─── R2 — a revoked policy can NOT be executed (fails at the same off-chain
  #     gate; the deleted on-chain struct is the backstop). The member's group
  #     delegation still mints — its OTHER live policies (9001/9020) carry the
  #     membership — so the rejection is genuinely the revoked gate. ───
  - name: r2_execute_after_retire_fails
    type: execute_under_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)30"
      operation_type: Send
      operation_data:
        token_address: aud-token-asset
        destination_id: collateral@yieldfabric.com
        amount: "100000000000000000000"
      idempotency_key: dp-9030-exec-revoked-bad-$(date +%s)
      expect_failure: true
      expect_error: "revoked on-chain"

  # ─── R5 — retire a policy id that was NEVER registered. No off-chain existence
  #     pre-check exists (by design — the chain is authoritative), so this submits
  #     and reverts on-chain: DataPolicyLib.removePolicy's empty-struct gate. ───
  - name: r5_retire_nonexistent_fails
    type: remove_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)31"   # never registered
      expect_failure: true
      expect_error: "PolicyDoesNotExist"

  # ─── R6 — the freed id is REUSABLE: re-register …30 (the chain accepts it —
  #     removePolicy freed the slot; the projection upsert revives the row as
  #     ACTIVE), approve afresh (the old artifact is gone), and execute. The
  #     execute succeeding proves the re-registration minted a FRESH on-chain
  #     policy struct (counter reset, new approval) — the complete reuse loop. ───
  - name: r6_reregister_same_id
    type: add_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)30"   # SAME id as the retired policy
      expiry: "$(date -v+365d +%s)"
      max_use: "5"
      min_signatories: 1
      required_signers: [ $owner_self_ctx.default_wallet_id ]
      executor_accounts: [ $member_ctx.default_wallet_id ]
      allowed_operations: [ send ]
      amount_bounds:
        - { token: aud-token-asset, lo: "0", hi: "500000000000000000000" }
      requirements:
        - { source: 0, denomination: aud-token-asset, lo: "0", hi: "1000000000000000000000000000" }
      idempotency_key: dp-9030-readd-$(date +%s)

  - name: r6_read_back_active
    type: data_policies
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      wallet_id: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)30"

  - name: r6_assert_active_again
    type: assert
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      actual: "$r6_read_back_active.found"
      equals: "True"

  - name: r6_assert_not_revoked
    type: assert
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      actual: "$r6_read_back_active.revoked"
      equals: "False"

  - name: r6_approve_again
    type: approve_data_policy
    user: { id: issuer@yieldfabric.com, password: issuer_password }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)30"

  - name: r6_execute_ok
    type: execute_under_policy
    user: { id: collateral@yieldfabric.com, password: collateral_password, group: Issuer Group }
    parameters:
      account: $owner_ctx.default_wallet_id
      policy_id: "$(cat /tmp/yf_grp_nonce)30"
      operation_type: Send
      operation_data:
        token_address: aud-token-asset
        destination_id: collateral@yieldfabric.com
        amount: "100000000000000000000"
      idempotency_key: dp-9030-exec-reuse-$(date +%s)
